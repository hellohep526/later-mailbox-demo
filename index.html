<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>后来信箱｜寄给未来自己的信</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --sun: #fbf4b8;
    --cream: #fffdf6;
    --paper: #fffaf0;
    --ink: #252720;
    --soft-ink: #74786f;
    --quiet: #a2a69d;
    --line: #e7dfcf;
    --line-dark: #d4c7b2;
    --green: #9bb89b;
    --green-dark: #4e6754;
    --blue: #a9c9d1;
    --blue-dark: #466977;
    --peach: #e6a08a;
    --yellow: #efd272;
    --lavender: #b9abc9;
    --shadow: 0 16px 36px rgba(83, 71, 49, .12);
  }

  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background: #f4eddb;
  }
  button, textarea, input, select { font: inherit; }
  button { border: 0; cursor: pointer; color: inherit; }

  .stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px 14px;
  }
  .phone {
    width: min(430px, 100%);
    height: min(900px, calc(100vh - 48px));
    border-radius: 30px;
    overflow: hidden;
    background: var(--cream);
    box-shadow: 0 20px 52px rgba(74, 63, 42, .2);
  }
  .app {
    position: relative;
    height: 100%;
    overflow-y: auto;
    background: var(--cream);
  }

  .hero {
    position: relative;
    min-height: 384px;
    padding: 24px 20px 38px;
    background:
      radial-gradient(circle at 22% 24%, rgba(255,255,255,.42) 0 54px, transparent 55px),
      radial-gradient(circle at 86% 38%, rgba(255,255,255,.34) 0 46px, transparent 47px),
      var(--sun);
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute;
    left: -8%;
    right: -8%;
    bottom: -62px;
    height: 132px;
    border-radius: 50% 50% 0 0 / 55% 55% 0 0;
    background: var(--cream);
  }

  .topbar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    min-width: 0;
  }
  .brand-mark {
    width: 42px;
    height: 42px;
    border: 2.5px solid #171914;
    border-radius: 14px;
    background: #fff8c9;
    transform: rotate(-6deg);
    position: relative;
    flex: 0 0 auto;
  }
  .brand-mark::before, .brand-mark::after {
    content: "";
    position: absolute;
    top: 12px;
    height: 2.5px;
    width: 24px;
    background: #171914;
  }
  .brand-mark::before { left: 2px; transform: rotate(32deg); }
  .brand-mark::after { right: 2px; transform: rotate(-32deg); }
  h1, h2, h3, p { margin: 0; }
  h1 {
    font-size: 23px;
    line-height: 1.15;
    letter-spacing: 0;
  }
  .brand p {
    color: #7d7d6f;
    font-size: 12px;
    line-height: 1.5;
  }
  .quiet-btn {
    position: relative;
    min-height: 40px;
    border-radius: 18px 21px 17px 20px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 0 13px 0 12px;
    background: #fffdf6;
    color: #5f7664;
    border: 1.5px dashed rgba(155, 184, 155, .72);
    box-shadow: 0 7px 14px rgba(78, 103, 84, .1);
    font-size: 12px;
    transform: rotate(1.5deg);
  }
  .quiet-btn::before {
    content: "";
    width: 15px;
    height: 15px;
    border: 2px solid currentColor;
    border-radius: 50% 50% 46% 46%;
    background: #eef7e9;
    box-shadow: inset 4px 0 0 rgba(255, 253, 246, .8);
  }
  .quiet-btn::after {
    content: "";
    position: absolute;
    right: 7px;
    top: 5px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #efd272;
  }

  .calendar-strip {
    position: relative;
    z-index: 2;
    width: 100%;
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 7px;
    margin-bottom: 24px;
    padding: 0;
    background: transparent;
    text-align: center;
  }
  .calendar-day {
    min-height: 78px;
    border-radius: 24px;
    background: rgba(255, 255, 255, .68);
    display: grid;
    justify-items: center;
    align-content: center;
    gap: 6px;
    color: #8c8a74;
    box-shadow: 0 7px 16px rgba(221, 211, 122, .13);
  }
  .calendar-day strong {
    font-size: 18px;
    line-height: 1.1;
    font-weight: 740;
    color: #6f715f;
  }
  .calendar-day span {
    font-size: 11px;
    line-height: 1.2;
  }
  .calendar-day.today {
    background: rgba(255, 253, 246, .92);
    outline: 2px solid rgba(78, 103, 84, .22);
  }
  .calendar-animal {
    position: relative;
    width: 27px;
    height: 22px;
    color: #5f7664;
  }
  .calendar-animal::before {
    content: "";
    position: absolute;
    left: 5px;
    top: 6px;
    width: 17px;
    height: 13px;
    border: 2px solid currentColor;
    border-radius: 48%;
    background: #fffdf6;
  }
  .calendar-animal::after {
    content: "";
    position: absolute;
    left: 10px;
    top: 12px;
    width: 2.5px;
    height: 2.5px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 7px 0 0 currentColor;
  }
  .calendar-animal i:nth-child(1), .calendar-animal i:nth-child(2) {
    position: absolute;
    top: 0;
    width: 6px;
    height: 12px;
    border: 2px solid currentColor;
    border-radius: 999px;
    background: #fffdf6;
  }
  .calendar-animal i:nth-child(1) { left: 8px; transform: rotate(-9deg); }
  .calendar-animal i:nth-child(2) { right: 8px; transform: rotate(9deg); }
  .calendar-empty {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px dashed rgba(140, 138, 116, .36);
    display: grid;
    place-items: center;
    color: rgba(140, 138, 116, .44);
    font-size: 16px;
    line-height: 1;
  }

  .write-entry {
    position: relative;
    z-index: 3;
    width: 100%;
    min-height: 154px;
    display: grid;
    grid-template-columns: 1fr 96px;
    align-items: center;
    gap: 12px;
    text-align: left;
    border-radius: 30px;
    background: var(--cream);
    border: 1px solid rgba(222, 214, 186, .86);
    box-shadow: var(--shadow);
    padding: 20px 18px 20px 22px;
  }
  .write-entry small {
    display: inline-block;
    width: max-content;
    max-width: 100%;
    margin-bottom: 10px;
    color: var(--green-dark);
    font-size: 13px;
    line-height: 1.35;
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: rgba(78, 103, 84, .32);
    text-underline-offset: 4px;
  }
  .write-entry strong {
    display: block;
    font-size: 27px;
    line-height: 1.22;
    letter-spacing: 0;
    margin-bottom: 8px;
  }
  .write-entry span {
    display: block;
    color: var(--soft-ink);
    font-size: 14px;
    line-height: 1.62;
  }
  .post-animal {
    position: relative;
    width: 88px;
    height: 96px;
    justify-self: end;
  }
  .post-animal .bag {
    position: absolute;
    left: 8px;
    bottom: 2px;
    width: 70px;
    height: 48px;
    border: 2.5px solid #6d5b47;
    border-radius: 9px;
    background: #fff3d6;
    transform: rotate(4deg);
  }
  .post-animal .bag::before, .post-animal .bag::after {
    content: "";
    position: absolute;
    top: 14px;
    width: 36px;
    height: 2px;
    background: #6d5b47;
  }
  .post-animal .bag::before { left: 2px; transform: rotate(30deg); }
  .post-animal .bag::after { right: 2px; transform: rotate(-30deg); }
  .post-animal .head {
    position: absolute;
    left: 22px;
    top: 7px;
    width: 49px;
    height: 44px;
    border: 2.5px solid #6d5b47;
    border-radius: 48% 48% 42% 42%;
    background: #fffaf0;
  }
  .post-animal .head::before, .post-animal .head::after {
    content: "";
    position: absolute;
    top: 14px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #6d5b47;
  }
  .post-animal .head::before { left: 14px; }
  .post-animal .head::after { right: 14px; }
  .post-animal i:nth-child(1), .post-animal i:nth-child(2) {
    position: absolute;
    top: -10px;
    width: 17px;
    height: 22px;
    border: 2.5px solid #6d5b47;
    border-bottom: 0;
    background: #fffaf0;
    border-radius: 999px 999px 0 0;
  }
  .post-animal i:nth-child(1) { left: 6px; transform: rotate(-15deg); }
  .post-animal i:nth-child(2) { right: 6px; transform: rotate(15deg); }

  .feed {
    position: relative;
    z-index: 1;
    padding: 18px 20px 128px;
  }
  .section-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin: 2px 0 16px;
  }
  .section-head h2 {
    font-size: 19px;
    line-height: 1.25;
    letter-spacing: 0;
  }
  .section-head span {
    color: var(--quiet);
    font-size: 13px;
    line-height: 1.4;
  }
  .letter-list { display: grid; gap: 30px; }
  .letter-entry {
    display: grid;
    grid-template-columns: 46px 1fr;
    gap: 0;
  }
  .entry-date {
    grid-column: 1 / -1;
    margin: 0 0 11px;
    color: #9ea19a;
    font-size: 17px;
    font-weight: 500;
  }
  .rail {
    position: relative;
    color: #aeb1aa;
    font-size: 15px;
    line-height: 1.5;
    padding-top: 1px;
  }
  .rail::before {
    content: "";
    position: absolute;
    top: 29px;
    left: 7px;
    width: 2px;
    height: calc(100% + 22px);
    background: #e2e4df;
  }
  .rail::after {
    content: "";
    position: absolute;
    left: 1px;
    top: 23px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid #c6cac1;
    background: var(--cream);
  }
  .postcard {
    position: relative;
    min-height: 170px;
    border-radius: 21px;
    border: 1px solid #ece6db;
    background: #fff;
    box-shadow: 0 5px 16px rgba(44, 38, 29, .08);
    overflow: hidden;
    text-align: left;
  }
  .postcard::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(#ded9ce 1.7px, transparent 1.7px);
    background-size: 28px 28px;
    opacity: .66;
  }
  .postcard.rain { background: #f4fbfd; }
  .postcard.station { background: #fff5e6; }
  .postcard.night { background: #fbf7ff; }
  .postcard.desk {
    background: #fffdf6;
  }
  .postcard.desk::before {
    background-image: repeating-linear-gradient(to bottom, transparent 0 30px, rgba(111, 105, 91, .18) 31px 32px);
    opacity: 1;
  }
  .postcard.store { background: #fff7ed; }
  .postcard.sea { background: #f2fbf8; }
  .postcard.arrived { border-color: #d7e3d1; }
  .postcard.locked .message { filter: blur(3.5px); user-select: none; }
  .postcard-inner {
    position: relative;
    z-index: 1;
    min-height: 170px;
    padding: 20px 104px 24px 24px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 12px;
    color: #8a8678;
    font-size: 12px;
    line-height: 1.4;
    letter-spacing: 0;
  }
  .tag::before {
    content: "";
    flex: 0 0 auto;
    width: 11px;
    height: 11px;
    border: 1.5px solid currentColor;
    border-radius: 50% 50% 50% 4px;
    background: rgba(255, 253, 246, .82);
    transform: rotate(-28deg);
    box-shadow: 5px 3px 0 rgba(239, 210, 114, .26);
  }
  .tag.arrived {
    color: var(--green-dark);
  }
  .tag.arrived::before {
    background: #eef7e9;
    box-shadow: 5px 3px 0 rgba(155, 184, 155, .25);
  }
  .message {
    font-size: 23px;
    line-height: 1.62;
    letter-spacing: 0;
    white-space: pre-wrap;
  }
  .meta {
    display: block;
    max-width: 100%;
    margin-top: 13px;
    color: #8d9188;
    font-size: 12px;
    line-height: 1.55;
  }
  .animal {
    position: absolute;
    right: 24px;
    bottom: 16px;
    width: 72px;
    height: 72px;
    z-index: 2;
  }
  .animal::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 20px;
    width: 44px;
    height: 37px;
    border: 3px solid currentColor;
    border-radius: 46% 46% 42% 42%;
    background: #fffdf6;
  }
  .animal::after {
    content: "";
    position: absolute;
    left: 26px;
    top: 35px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 16px 0 0 currentColor;
  }
  .animal i:nth-child(1), .animal i:nth-child(2) {
    position: absolute;
    background: #fffdf6;
    border: 3px solid currentColor;
  }
  .animal.rabbit { color: #5f7664; }
  .animal.rabbit i:nth-child(1), .animal.rabbit i:nth-child(2) {
    top: 0;
    width: 12px;
    height: 34px;
    border-radius: 999px;
  }
  .animal.rabbit i:nth-child(1) { left: 21px; transform: rotate(-9deg); }
  .animal.rabbit i:nth-child(2) { right: 22px; transform: rotate(9deg); }
  .animal.cat { color: #5a6370; }
  .animal.cat i:nth-child(1), .animal.cat i:nth-child(2) {
    top: 11px;
    width: 18px;
    height: 20px;
    border-bottom: 0;
    transform: rotate(45deg);
  }
  .animal.cat i:nth-child(1) { left: 14px; }
  .animal.cat i:nth-child(2) { right: 14px; }
  .animal.bear { color: #7a6250; }
  .animal.bear i:nth-child(1), .animal.bear i:nth-child(2) {
    top: 12px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
  }
  .animal.bear i:nth-child(1) { left: 13px; }
  .animal.bear i:nth-child(2) { right: 12px; }
  .animal.fox { color: #80624d; }
  .animal.fox::before {
    border-radius: 48% 48% 50% 50%;
  }
  .animal.fox i:nth-child(1), .animal.fox i:nth-child(2) {
    top: 9px;
    width: 19px;
    height: 23px;
    border-bottom: 0;
    border-radius: 6px 999px 0 0;
  }
  .animal.fox i:nth-child(1) { left: 10px; transform: rotate(-34deg); }
  .animal.fox i:nth-child(2) { right: 10px; transform: rotate(34deg) scaleX(-1); }
  .animal.dog { color: #6d6f57; }
  .animal.dog i:nth-child(1), .animal.dog i:nth-child(2) {
    top: 14px;
    width: 16px;
    height: 25px;
    border-radius: 999px 999px 12px 12px;
  }
  .animal.dog i:nth-child(1) { left: 8px; transform: rotate(18deg); }
  .animal.dog i:nth-child(2) { right: 8px; transform: rotate(-18deg); }

  .float-write {
    position: sticky;
    left: calc(100% - 82px);
    bottom: 18px;
    z-index: 8;
    width: 58px;
    height: 58px;
    margin: -80px 20px 22px auto;
    border-radius: 20px 24px 20px 23px;
    display: grid;
    place-items: center;
    background: #e8f3df;
    color: var(--green-dark);
    border: 1.8px dashed #a9c69f;
    box-shadow: 0 10px 20px rgba(78, 103, 84, .16);
    transform: rotate(-4deg);
  }
  .float-write::before {
    content: "";
    position: absolute;
    right: 7px;
    top: 7px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff4b6;
    box-shadow: -25px 35px 0 rgba(255, 253, 246, .78);
  }
  .float-write svg {
    position: relative;
    z-index: 1;
    width: 28px;
    height: 28px;
    stroke-width: 3.2;
    transform: rotate(4deg);
  }

  .calendar-layer,
  .sheet,
  .reader {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: none;
    background: rgba(39, 34, 26, .24);
  }
  .calendar-layer.show,
  .sheet.show,
  .reader.show { display: flex; }
  .calendar-layer { align-items: flex-end; }
  .calendar-panel {
    width: 100%;
    max-height: 88%;
    overflow-y: auto;
    border-radius: 30px 30px 0 0;
    background: var(--cream);
    padding: 18px 20px 24px;
    box-shadow: 0 -16px 44px rgba(45, 39, 31, .16);
  }
  .calendar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .calendar-head h2 {
    font-size: 22px;
    line-height: 1.25;
  }
  .calendar-note {
    color: #90948a;
    font-size: 13px;
    line-height: 1.7;
    margin: 0 0 14px;
  }
  .month-board {
    border: 1px solid #e8dfcf;
    border-radius: 24px;
    background: #fffaf0;
    padding: 15px 12px 14px;
    box-shadow: 0 5px 16px rgba(44, 38, 29, .07);
  }
  .week-row,
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 7px;
  }
  .week-row {
    color: #a2a69d;
    font-size: 12px;
    text-align: center;
    margin-bottom: 8px;
  }
  .month-cell {
    min-height: 58px;
    border-radius: 16px;
    background: rgba(255, 255, 255, .66);
    border: 1px solid rgba(232, 223, 207, .7);
    display: grid;
    place-items: center;
    align-content: center;
    gap: 4px;
    color: #777a72;
    font-size: 14px;
  }
  .month-cell.blank {
    background: transparent;
    border-color: transparent;
  }
  .month-cell.has-letter {
    background: #f6fbf3;
    border-color: #cadcc3;
  }
  .month-cell.arrived {
    background: #fbf7ff;
    border-color: #d9cfe3;
  }
  .month-cell .calendar-animal {
    transform: scale(.9);
  }
  .calendar-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    color: #85887f;
    font-size: 12px;
    line-height: 1.5;
  }
  .calendar-legend .calendar-animal {
    flex: 0 0 auto;
  }
  .sheet { align-items: flex-end; }
  .sheet-panel {
    width: 100%;
    max-height: 88%;
    overflow-y: auto;
    border-radius: 30px 30px 0 0;
    background: var(--cream);
    padding: 18px 20px 24px;
    box-shadow: 0 -16px 44px rgba(45, 39, 31, .16);
  }
  .sheet-head, .reader-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .sheet-head h2, .reader-head h2 {
    font-size: 22px;
    line-height: 1.25;
  }
  .close-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #f2eee2;
    color: #777a72;
    font-size: 24px;
    line-height: 1;
  }
  .compose-card {
    min-height: 270px;
    border-radius: 22px;
    border: 1px solid #ece6db;
    background:
      radial-gradient(#ded9ce 1.7px, transparent 1.7px) 0 0 / 28px 28px,
      #fff;
    box-shadow: 0 5px 16px rgba(44, 38, 29, .08);
    padding: 20px;
  }
  .compose-card textarea {
    width: 100%;
    min-height: 202px;
    resize: vertical;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    font-size: 23px;
    line-height: 1.65;
    letter-spacing: 0;
  }
  .compose-card textarea::placeholder { color: #b6b6aa; }
  .deliver-box {
    margin-top: 14px;
  }
  .deliver-label {
    display: block;
    margin-bottom: 8px;
    color: #7a7d74;
    font-size: 13px;
    line-height: 1.5;
  }
  .deliver-options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .deliver-option {
    min-height: 44px;
    border-radius: 15px;
    background: #fffdf7;
    border: 1px solid #e1d8c8;
    color: #72766d;
    font-size: 13px;
  }
  .deliver-option.active {
    color: var(--green-dark);
    background: #edf5ea;
    border-color: #b9cfb4;
    box-shadow: 0 0 0 2px rgba(155, 184, 155, .14) inset;
  }
  .custom-deliver {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    border-radius: 15px;
    padding: 0 12px;
    background: #fffdf7;
    border: 1px solid #e1d8c8;
    color: #72766d;
    font-size: 13px;
  }
  .custom-deliver input {
    width: 100%;
    min-width: 0;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    font-size: 15px;
  }
  .send-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .send-btn {
    min-height: 48px;
    border-radius: 15px;
    background: #526d58;
    color: #fffdf6;
    font-weight: 700;
    box-shadow: 0 8px 16px rgba(78, 103, 84, .16);
  }
  .sheet-tip {
    margin-top: 12px;
    color: #969990;
    font-size: 13px;
    line-height: 1.7;
  }

  .reader {
    align-items: center;
    padding: 20px;
  }
  .reader-panel {
    width: 100%;
    border-radius: 26px;
    background: var(--cream);
    padding: 16px;
    box-shadow: 0 18px 48px rgba(39, 34, 26, .18);
  }
  .reader-postcard {
    position: relative;
    min-height: 380px;
    border-radius: 22px;
    border: 1px solid #ece6db;
    overflow: hidden;
    background: #fff;
  }
  .reader-postcard::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(#ded9ce 1.7px, transparent 1.7px);
    background-size: 28px 28px;
    opacity: .66;
  }
  .reader-postcard::after {
    content: "";
    position: absolute;
    pointer-events: none;
  }
  .reader-postcard.rain { background: #f4fbfd; }
  .reader-postcard.station { background: #fff5e6; }
  .reader-postcard.night { background: #fbf7ff; }
  .reader-postcard.desk { background: #fffdf6; }
  .reader-postcard.desk::before {
    background-image: repeating-linear-gradient(to bottom, transparent 0 30px, rgba(111, 105, 91, .18) 31px 32px);
    opacity: 1;
  }
  .reader-postcard.store { background: #fff7ed; }
  .reader-postcard.sea { background: #f2fbf8; }
  .reader-copy {
    position: relative;
    z-index: 2;
    padding: 36px 28px 100px;
  }
  .reader-title {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 18px;
    color: var(--green-dark);
    font-size: 12px;
    line-height: 1.4;
  }
  .reader-title::before {
    content: "";
    flex: 0 0 auto;
    width: 11px;
    height: 11px;
    border: 1.5px solid currentColor;
    border-radius: 50% 50% 50% 4px;
    background: #eef7e9;
    transform: rotate(-28deg);
    box-shadow: 5px 3px 0 rgba(155, 184, 155, .25);
  }
  .reader-text {
    font-size: 24px;
    line-height: 1.72;
    white-space: pre-wrap;
  }
  .reader-postcard.locked {
    min-height: 360px;
    background: #fff8e9;
    border-color: #e4d8c4;
    border-style: dashed;
  }
  .reader-postcard.locked::before {
    inset: 64px 24px 86px;
    border: 1.5px solid #ded0bb;
    border-radius: 16px;
    background:
      linear-gradient(34deg, transparent 49%, rgba(126, 106, 79, .18) 50% 51%, transparent 52%),
      linear-gradient(-34deg, transparent 49%, rgba(126, 106, 79, .18) 50% 51%, transparent 52%),
      #fffdf6;
    opacity: 1;
    box-shadow: 0 10px 22px rgba(92, 77, 52, .08);
  }
  .reader-postcard.locked::after {
    left: 50%;
    top: 168px;
    z-index: 3;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 1.8px dashed #9bb89b;
    background: #edf5ea;
    transform: translateX(-50%) rotate(-8deg);
    box-shadow: inset 0 0 0 8px rgba(255, 253, 246, .68);
  }
  .reader-postcard.locked .reader-copy {
    padding: 38px 30px 126px;
    text-align: center;
  }
  .reader-postcard.locked .reader-title {
    color: #7a7467;
  }
  .reader-postcard.locked .reader-title::before {
    border-radius: 50%;
    background: #fffdf6;
    box-shadow: 5px 3px 0 rgba(212, 199, 178, .35);
  }
  .reader-postcard.locked .reader-text {
    max-width: 220px;
    margin: 72px auto 0;
    color: rgba(37, 39, 32, .48);
    font-size: 18px;
    line-height: 1.95;
    filter: blur(6px);
    opacity: .58;
    transform: rotate(-2deg);
    user-select: none;
  }
  .reader-postcard.locked .animal {
    right: 32px;
    bottom: 24px;
    transform: scale(.86) rotate(2deg);
  }
  .reader-postcard.opening {
    animation: letterOpen .92s ease both;
  }
  .reader-postcard.opening .reader-copy {
    animation: paperRise .92s cubic-bezier(.2, .75, .2, 1) both;
  }
  .reader-postcard.opening .animal {
    animation: animalPeek .92s ease both;
  }
  .reader-postcard.opening::after {
    inset: 18px;
    z-index: 4;
    border-radius: 18px;
    background:
      linear-gradient(160deg, transparent 0 48%, rgba(116, 103, 81, .18) 49% 51%, transparent 52%),
      linear-gradient(200deg, transparent 0 48%, rgba(116, 103, 81, .18) 49% 51%, transparent 52%),
      linear-gradient(to bottom, rgba(255,253,246,.96), rgba(242,235,221,.92));
    transform-origin: top;
    animation: flapOpen .92s ease both;
  }
  @keyframes letterOpen {
    0% { transform: translateY(10px) scale(.96); opacity: .72; }
    50% { transform: translateY(0) scale(1.012); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes paperRise {
    0% { transform: translateY(58px) scale(.94); opacity: 0; }
    38% { transform: translateY(34px) scale(.96); opacity: 0; }
    78% { transform: translateY(-4px) scale(1.01); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes animalPeek {
    0%, 38% { transform: translateY(34px) scale(.82); opacity: 0; }
    78% { transform: translateY(-3px) scale(1.16); opacity: 1; }
    100% { transform: translateY(0) scale(1.12); opacity: 1; }
  }
  @keyframes flapOpen {
    0% { transform: rotateX(0deg); opacity: 1; }
    64% { transform: rotateX(76deg); opacity: .58; }
    100% { transform: rotateX(88deg); opacity: 0; }
  }
  .reader-postcard .animal {
    right: 26px;
    bottom: 24px;
    transform: scale(1.12);
  }
  .reader-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .soft-btn, .dark-btn {
    min-height: 46px;
    border-radius: 16px 18px 15px 17px;
    font-weight: 700;
    border: 1.5px dashed transparent;
  }
  .soft-btn {
    background: #fffdf6;
    color: #74776e;
    border-color: rgba(212, 199, 178, .86);
  }
  .dark-btn {
    background: #e8f3df;
    color: var(--green-dark);
    border-color: #a9c69f;
    box-shadow: 0 7px 14px rgba(78, 103, 84, .1);
  }

  .toast {
    position: absolute;
    left: 50%;
    bottom: 116px;
    transform: translateX(-50%) translateY(16px);
    max-width: calc(100% - 44px);
    width: max-content;
    border-radius: 18px;
    background: #20221f;
    color: #fffdf6;
    padding: 11px 14px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 40;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .stage { display: block; padding: 0; }
    .phone { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
    .hero { min-height: 396px; padding: 28px 20px 38px; }
    .calendar-strip { gap: 6px; }
    .calendar-day { min-height: 70px; border-radius: 22px; }
    .write-entry { min-height: 150px; }
    .write-entry strong { font-size: 26px; }
    .message, .compose-card textarea, .reader-text { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="stage">

<script>
  const app = document.getElementById("app");
  const calendarLayer = document.getElementById("calendarLayer");
  const writeSheet = document.getElementById("writeSheet");
  const reader = document.getElementById("reader");
  const letterList = document.getElementById("letterList");
  const letterText = document.getElementById("letterText");
  const deliveryOptions = [...document.querySelectorAll(".deliver-option")];
  const customDays = document.getElementById("customDays");
  const toast = document.getElementById("toast");
  const readerHead = document.getElementById("readerHead");
  const readerCard = document.getElementById("readerCard");
  const readerTitle = document.getElementById("readerTitle");
  const readerText = document.getElementById("readerText");
  const readerAnimal = document.getElementById("readerAnimal");

  const matchRules = [
    { keys: ["雨", "哭", "湿", "伞", "难过"], theme: "rain", animal: "rabbit" },
    { keys: ["夜", "睡", "灯", "窗", "失眠"], theme: "night", animal: "cat" },
    { keys: ["面试", "考试", "课", "学校", "毕业", "简历"], theme: "desk", animal: "fox" },
    { keys: ["走", "车", "站", "离开", "出发"], theme: "station", animal: "bear" },
    { keys: ["饭", "饿", "便利店", "晚归"], theme: "store", animal: "dog" },
    { keys: ["海", "风", "夏天"], theme: "sea", animal: "rabbit" }
  ];

  function openCalendar() {
    calendarLayer.classList.add("show");
    calendarLayer.setAttribute("aria-hidden", "false");
  }

  function closeCalendar() {
    calendarLayer.classList.remove("show");
    calendarLayer.setAttribute("aria-hidden", "true");
  }

  function openWrite() {
    closeCalendar();
    writeSheet.classList.add("show");
    writeSheet.setAttribute("aria-hidden", "false");
    setTimeout(() => letterText.focus(), 70);
  }

  function resetDeliveryOptions() {
    customDays.value = "";
    deliveryOptions.forEach(option => option.classList.toggle("active", option.dataset.delivery === "一个月后抵达"));
  }

  function closeWrite() {
    writeSheet.classList.remove("show");
    writeSheet.setAttribute("aria-hidden", "true");
  }

  function closeReader() {
    reader.classList.remove("show");
    reader.setAttribute("aria-hidden", "true");
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function escapeHtml(value) {
    return value.replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
  }

  function getToday() {
    const now = new Date();
    return {
      date: `${now.getMonth() + 1}月${now.getDate()}日`,
      dataDate: `${now.getMonth() + 1}-${now.getDate()}`,
      time: `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`
    };
  }

  function matchStyle(text) {
    return matchRules.find(rule => rule.keys.some(key => text.includes(key))) || {
      theme: "station",
      animal: "rabbit"
    };
  }

  function previewText(text) {
    const clean = text.trim().replace(/\n{3,}/g, "\n\n");
    if (clean.length <= 34) return clean;
    return clean.slice(0, 34) + "...";
  }

  function getDeliveryText() {
    const days = Number(customDays.value);
    if (Number.isFinite(days) && days > 1) return `${Math.floor(days)}天后抵达`;
    const active = deliveryOptions.find(option => option.classList.contains("active"));
    return active ? active.dataset.delivery : "一个月后抵达";
  }

  function animalMarkup(type) {
    return `<span class="animal ${type}"><i></i><i></i></span>`;
  }

  function normalizeMessage(value) {
    return (value || "").replace(/\\n/g, "\n");
  }

  function openReaderFromCard(card) {
    closeCalendar();
    const isLocked = card.dataset.state === "locked";
    const theme = card.dataset.theme || "station";
    const animal = card.dataset.animal || "rabbit";
    readerHead.textContent = isLocked ? "这封信还封着" : "信抵达了";
    readerTitle.textContent = isLocked ? "到时间再打开" : "今天抵达";
    readerText.textContent = normalizeMessage(card.dataset.message);
    readerCard.className = `reader-postcard ${theme}${isLocked ? " locked" : " opening"}`;
    readerAnimal.className = `animal ${animal}`;
    readerAnimal.innerHTML = "<i></i><i></i>";
    reader.classList.add("show");
    reader.setAttribute("aria-hidden", "false");
    if (!isLocked) {
      window.clearTimeout(openReaderFromCard.timer);
      openReaderFromCard.timer = window.setTimeout(() => {
        readerCard.classList.remove("opening");
      }, 1050);
    }
  }

  function bindPostcard(card) {
    card.addEventListener("click", () => openReaderFromCard(card));
  }

  document.querySelectorAll("[data-open-calendar]").forEach(button => {
    button.addEventListener("click", openCalendar);
  });

  document.querySelectorAll("[data-open-write]").forEach(button => {
    button.addEventListener("click", event => {
      event.stopPropagation();
      closeReader();
      openWrite();
    });
  });

  document.querySelectorAll("[data-open-reader]").forEach(button => {
    button.addEventListener("click", () => {
      const arrived = document.querySelector('.postcard[data-state="arrived"]');
      if (arrived) openReaderFromCard(arrived);
    });
  });

  document.querySelectorAll("[data-open-date]").forEach(day => {
    day.addEventListener("click", event => {
      event.stopPropagation();
      const card = document.querySelector(`.postcard[data-date="${day.dataset.openDate}"]`);
      if (card) openReaderFromCard(card);
    });
  });

  deliveryOptions.forEach(button => {
    button.addEventListener("click", () => {
      deliveryOptions.forEach(option => option.classList.toggle("active", option === button));
      customDays.value = "";
    });
  });

  customDays.addEventListener("input", () => {
    if (customDays.value) {
      deliveryOptions.forEach(option => option.classList.remove("active"));
    }
  });

  document.getElementById("closeCalendar").addEventListener("click", closeCalendar);
  document.querySelector("[data-close-write]").addEventListener("click", closeWrite);
  document.getElementById("closeReader").addEventListener("click", closeReader);
  document.getElementById("putBackBtn").addEventListener("click", closeReader);
  document.querySelectorAll(".postcard").forEach(bindPostcard);

  calendarLayer.addEventListener("click", event => {
    if (event.target === calendarLayer) closeCalendar();
  });
  writeSheet.addEventListener("click", event => {
    if (event.target === writeSheet) closeWrite();
  });
  reader.addEventListener("click", event => {
    if (event.target === reader) closeReader();
  });

  document.getElementById("sendBtn").addEventListener("click", () => {
    const text = letterText.value.trim();
    if (!text) {
      showToast("先留下一句话。晚一点的你会读到。");
      return;
    }
    const matched = matchStyle(text);
    const time = getToday();
    const delivery = getDeliveryText();
    const entry = document.createElement("article");
    entry.className = "letter-entry";
    entry.innerHTML = `
      <h2 class="entry-date">${time.date}</h2>
      <div class="rail">${time.time}</div>
      <button class="postcard locked ${matched.theme}" data-date="${time.dataDate}" data-state="locked" data-theme="${matched.theme}" data-animal="${matched.animal}" data-message="${escapeHtml(text)}">
        <div class="postcard-inner">
          <span class="tag">${escapeHtml(delivery)}</span>
          <div class="message">${escapeHtml(previewText(text)).replace(/\n/g, "<br>")}</div>
          <p class="meta">${time.date} ${time.time} 寄出 · 预计 ${escapeHtml(delivery)}</p>
          ${animalMarkup(matched.animal)}
        </div>
      </button>`;
    letterList.prepend(entry);
    bindPostcard(entry.querySelector(".postcard"));
    letterText.value = "";
    resetDeliveryOptions();
    closeWrite();
    app.scrollTo({ top: 0, behavior: "smooth" });
    showToast("已经寄出。让时间先替你收好。");
  });
</script>
</body>
</html>
